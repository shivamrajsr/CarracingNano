<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybertrunk Nano Racing</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f0c29; }
    #info {
      position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace;
      background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; z-index: 1;
    }
    #gameOverOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-family: monospace;
      z-index: 3;
      text-align: center;
    }
    #gameOverOverlay .panel {
      background: rgba(15,12,41,0.9);
      border: 1px solid #00fff7;
      box-shadow: 0 0 20px #00fff7;
      padding: 20px 28px;
      border-radius: 10px;
    }
    #gameOverOverlay button {
      margin-top: 12px;
      font-size: 1.1em;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: #00fff7;
      color: #222;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="info">Cybertrunk Nano Racing<br>Use Arrow Keys or WASD to drive<br><span id="score">Score: 0</span></div>
  <button id="playPauseBtn" style="position:absolute;top:10px;right:10px;z-index:2;font-size:1.1em;padding:8px 18px;border-radius:8px;border:none;background:#00fff7;color:#222;cursor:pointer;">Pause</button>
  <div id="gameOverOverlay">
    <div class="panel">
      Game Over<br>
      <div>Final Score: <span id="finalScore">0</span></div>
      <button id="restartBtn">Restart</button>
    </div>
  </div>
  <audio id="bgm" src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b5b2b1b2.mp3" loop></audio>
  <audio id="engine" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9e3b3e.mp3" loop></audio>
  <audio id="accel" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9e3b3e.mp3"></audio>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog("#0f0c29", 20, 200);
    
    // Camera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, -10);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor("#0f0c29");
    document.body.appendChild(renderer.domElement);

    // Nano-themed lights
    const ambient = new THREE.AmbientLight("#00fff7", 0.3);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight("#00ff99", 0.7);
    dirLight.position.set(10, 20, -10);
    scene.add(dirLight);

    // Road
    const roadWidth = 8, roadLength = 1000;
    const roadGeo = new THREE.BoxGeometry(roadWidth, 0.2, roadLength);
    const roadMat = new THREE.MeshStandardMaterial({color: "#222", emissive: "#00fff7", emissiveIntensity: 0.1});
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.position.y = -0.1;
    scene.add(road);

    // Nano light stripes on road
    for (let i = -roadLength/2; i < roadLength/2; i += 10) {
      const stripeGeo = new THREE.BoxGeometry(0.5, 0.05, 4);
      const stripeMat = new THREE.MeshStandardMaterial({color: "#00fff7", emissive: "#00fff7", emissiveIntensity: 1});
      const stripe = new THREE.Mesh(stripeGeo, stripeMat);
      stripe.position.set(0, 0.11, i);
      scene.add(stripe);
    }

    // Obstacles
    const obstacles = [];
    const obstacleBoxes = [];
    const numObstacles = 10;
    const obstacleGeo = new THREE.BoxGeometry(1, 1, 1.6);
    const obstacleMatBase = new THREE.MeshStandardMaterial({
      color: "#ff00ea",
      emissive: "#ff00ea",
      emissiveIntensity: 0.8,
      metalness: 0.6,
      roughness: 0.4
    });
    function createObstacles() {
      for (let i = 0; i < numObstacles; i++) {
        const mat = obstacleMatBase.clone();
        const o = new THREE.Mesh(obstacleGeo, mat);
        o.position.y = 0.5;
        scene.add(o);
        obstacles.push(o);
        obstacleBoxes.push(new THREE.Box3());
      }
    }
    function randomizeObstacles() {
      const minX = -roadWidth/2 + 0.8;
      const maxX = roadWidth/2 - 0.8;
      const minZ = -roadLength/2 + 40;
      const maxZ = roadLength/2 - 40;
      for (let i = 0; i < obstacles.length; i++) {
        const o = obstacles[i];
        let z;
        let attempts = 0;
        do {
          z = Math.random() * (maxZ - minZ) + minZ;
          attempts++;
        } while ((z < (car?.position.z ?? 0) + 20 && z > (car?.position.z ?? 0) - 10) && attempts < 10);
        const x = Math.random() * (maxX - minX) + minX;
        o.position.set(x, 0.5, z);
      }
    }

    // Buildings
    function addBuilding(x, z, color) {
      const height = 4 + Math.random() * 16;
      const geo = new THREE.BoxGeometry(2 + Math.random()*2, height, 2 + Math.random()*2);
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: color,
        emissiveIntensity: 0.7 + Math.random()*0.5,
        metalness: 0.8,
        roughness: 0.3
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, height/2, z);
      scene.add(mesh);
    }
    const buildingColors = ["#00fff7", "#ff00ea", "#00ff99", "#fffb00", "#00bfff"];
    for (let z = -roadLength/2; z < roadLength/2; z += 10) {
      for (let side of [-1, 1]) {
        if (Math.random() > 0.3) {
          addBuilding(side * (roadWidth/2 + 2 + Math.random()*4), z, buildingColors[Math.floor(Math.random()*buildingColors.length)]);
        }
      }
    }

    // Car
    const car = new THREE.Group();
    const carBodyGeo = new THREE.BoxGeometry(1.2, 0.5, 2.5);
    const carBodyMat = new THREE.MeshStandardMaterial({color: "#fff", emissive: "#00fff7", emissiveIntensity: 0.5});
    const carBody = new THREE.Mesh(carBodyGeo, carBodyMat);
    carBody.position.y = 0.35;
    car.add(carBody);
    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.4, 16);
    const wheelMat = new THREE.MeshStandardMaterial({color: "#222"});
    for (let x of [-0.5, 0.5]) {
      for (let z of [-0.9, 0.9]) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI/2;
        wheel.position.set(x, 0.15, z);
        car.add(wheel);
      }
    }
    car.position.set(0, 0.25, -roadLength/2 + 5);
    scene.add(car);
    // Initialize obstacles
    createObstacles();
    randomizeObstacles();

    // Car controls
    let speed = 0, maxSpeed = 1.2, acc = 0.03, friction = 0.015, steer = 0;
    let keys = {};
    let score = 0;
    let lastZ = car.position.z;
    let paused = false;
    let gameOver = false;
    let bgm = document.getElementById('bgm');
    let engine = document.getElementById('engine');
    let accel = document.getElementById('accel');
    let playPauseBtn = document.getElementById('playPauseBtn');
    let scoreDisplay = document.getElementById('score');
    let overlay = document.getElementById('gameOverOverlay');
    let finalScoreEl = document.getElementById('finalScore');
    let restartBtn = document.getElementById('restartBtn');
    let enginePlaying = false;
    let accelPlaying = false;
    const carBox = new THREE.Box3();
    
    function playAll() {
      bgm.play();
      engine.play();
    }
    function pauseAll() {
      bgm.pause();
      engine.pause();
      accel.pause();
    }
    playPauseBtn.onclick = function() {
      paused = !paused;
      playPauseBtn.textContent = paused ? 'Play' : 'Pause';
      if (paused) pauseAll();
      else if (!gameOver) playAll();
    };
    function endGame() {
      if (gameOver) return;
      gameOver = true;
      paused = true;
      pauseAll();
      finalScoreEl.textContent = Math.floor(score);
      overlay.style.display = 'flex';
      playPauseBtn.disabled = true;
    }
    function resetGame() {
      score = 0;
      scoreDisplay.textContent = 'Score: 0';
      speed = 0;
      steer = 0;
      gameOver = false;
      paused = false;
      playPauseBtn.disabled = false;
      playPauseBtn.textContent = 'Pause';
      car.position.set(0, 0.25, -roadLength/2 + 5);
      lastZ = car.position.z;
      randomizeObstacles();
      overlay.style.display = 'none';
      playAll();
    }
    restartBtn.onclick = resetGame;
    // Start music on first user interaction (browser policy)
    window.addEventListener('keydown', function once() {
      playAll();
      window.removeEventListener('keydown', once);
    });
    document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function animate() {
      if (!paused && !gameOver) {
        // Controls
        if (keys['arrowup'] || keys['w']) {
          speed += acc;
          if (!accelPlaying) {
            accel.currentTime = 0;
            accel.play();
            accelPlaying = true;
          }
        } else {
          speed -= friction;
          accel.pause();
          accelPlaying = false;
        }
        if (keys['arrowdown'] || keys['s']) speed -= acc*0.7;
        if (keys['arrowright'] || keys['a']) steer = Math.max(steer - 0.04, -0.04);
        else if (keys['arrowleft'] || keys['d']) steer = Math.min(steer + 0.04, 0.04);
        else steer *= 0.7;
        speed = Math.max(Math.min(speed, maxSpeed), 0);
        car.position.z += speed * 2;
        car.position.x += steer * 2;
        car.position.x = Math.max(Math.min(car.position.x, roadWidth/2-0.7), -roadWidth/2+0.7);
        // Wrap for infinite road
        if (car.position.z > roadLength/2 - 5) {
          car.position.z -= roadLength;
          lastZ = car.position.z;
          randomizeObstacles();
        }
        // Scoring
        score += Math.max(0, car.position.z - lastZ);
        lastZ = car.position.z;
        scoreDisplay.textContent = 'Score: ' + Math.floor(score);
        // Engine sound volume
        engine.volume = Math.min(0.2 + speed/2, 1);
        // Camera follows car
        camera.position.lerp(new THREE.Vector3(car.position.x, 5, car.position.z - 10), 0.1);
        camera.lookAt(car.position.x, 0.5, car.position.z + 10);
        // Collision detection
        carBox.setFromObject(car);
        for (let i = 0; i < obstacles.length; i++) {
          obstacleBoxes[i].setFromObject(obstacles[i]);
          if (carBox.intersectsBox(obstacleBoxes[i])) {
            endGame();
            break;
          }
        }
      }
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
