<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberPunkNano Racing</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f0c29; }
    #info {
      position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace;
      background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; z-index: 1;
    }
    #gameOverOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-family: monospace;
      z-index: 3;
      text-align: center;
    }
    #gameOverOverlay .panel {
      background: rgba(15,12,41,0.9);
      border: 1px solid #00fff7;
      box-shadow: 0 0 20px #00fff7;
      padding: 20px 28px;
      border-radius: 10px;
    }
    #gameOverOverlay button {
      margin-top: 12px;
      font-size: 1.1em;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: #00fff7;
      color: #222;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="info">CyberPunk Racing<br>Use Arrow Keys or WASD to drive<br><span id="score">Score: 0</span></div>
  <button id="playPauseBtn" style="position:absolute;top:10px;right:10px;z-index:2;font-size:1.1em;padding:8px 18px;border-radius:8px;border:none;background:#00fff7;color:#222;cursor:pointer;">Pause</button>
  <div id="gameOverOverlay">
    <div class="panel">
      Game Over<br>
      <div>Final Score: <span id="finalScore">0</span></div>
      <button id="restartBtn">Restart</button>
    </div>
  </div>
  <audio id="bgm" src="audio/racingcarsbgmusic.mp3" loop></audio>
  <audio id="engine" src="" loop></audio>
  <audio id="accel" src="audio/accelarating.mp3"></audio>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog("#0f0c29", 20, 200);
    
    // Camera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, -10);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor("#0f0c29");
    document.body.appendChild(renderer.domElement);

    // Nano-themed lights
    const ambient = new THREE.AmbientLight("#00fff7", 0.3);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight("#00ff99", 0.7);
    dirLight.position.set(10, 20, -10);
    scene.add(dirLight);

    // Infinite Road (segment-based)
    const roadWidth = 10;
    const segmentLength = 400;
    const maintainAheadDistance = 1000;   // how far ahead to keep segments
    const maintainBehindDistance = 400;  // how far behind to keep segments
    const roadGeo = new THREE.BoxGeometry(roadWidth, 0.2, segmentLength);
    const roadMat = new THREE.MeshStandardMaterial({color: "#222", emissive: "#00fff7", emissiveIntensity: 0.1});
    const stripeGeo = new THREE.BoxGeometry(0.5, 0.05, 4);
    const stripeMat = new THREE.MeshStandardMaterial({color: "#00fff7", emissive: "#00fff7", emissiveIntensity: 1});

    const roadSegments = []; // array of THREE.Group with userData.zStart

    // Obstacles (dynamic, tied to segments)
    const obstacles = []; // { mesh, box, group }
    const obstacleGeo = new THREE.BoxGeometry(0.8, 1, 1.6);
    const obstacleMatBase = new THREE.MeshStandardMaterial({
      color: "#ff00ea",
      emissive: "#ff0000",
      emissiveIntensity: 0.6,
      metalness: 0.6,
      roughness: 0.3
    });

    function createBuildingMesh(x, z) {
      const height = 4 + Math.random() * 16;
      const geo = new THREE.BoxGeometry(2 + Math.random()*2, height, 2 + Math.random()*2);
      const buildingColors = [
        "#00fff7", "#ff00ea", "#00ff99", "#fffb00", "#00bfff",
        "#ff5733", "#33ff57", "#3357ff", "#ff33a6", "#a633ff",
        "#00ffaa", "#ffaa00", "#ff0066", "#66ff00", "#0066ff"
      ];
      const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: color,
        emissiveIntensity: 0.7 + Math.random()*0.5,
        metalness: 0.8,
        roughness: 0.3
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, height/2, z);
      return mesh;
    }

    let initialSegmentIndex = 0; // set after car spawn/reset

    function createRoadSegment(zStart) {
      const group = new THREE.Group();
      group.userData.zStart = zStart;

      // Road slab
      const road = new THREE.Mesh(roadGeo, roadMat);
      road.position.set(0, -0.1, zStart + segmentLength/2);
      group.add(road);

      // Stripes down the center
      for (let dz = 5; dz < segmentLength; dz += 10) {
        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
        stripe.position.set(0, 0.11, zStart + dz);
        group.add(stripe);
      }

      // Buildings along both sides, sparse
      for (let dz = 0; dz < segmentLength; dz += 20) {
        for (const side of [-1, 1]) {
          if (Math.random() > 0.4) {
            const x = side * (roadWidth/2 + 4 + Math.random()*4);
            const z = zStart + dz + Math.random()*10;
            const b = createBuildingMesh(x, z);
            group.add(b);
          }
        }
      }

      // Obstacles increase with progress: +1 per segment, capped
      const segmentIndex = Math.floor(zStart / segmentLength);
      const progressIndex = Math.max(0, segmentIndex - initialSegmentIndex);
      const maxObstaclesPerSegment = 3;
      const obstaclesInSegment = Math.min( progressIndex, maxObstaclesPerSegment);
      const minX = -roadWidth/2 + 0.8;
      const maxX = roadWidth/2 - 0.8;
      const placed = [];
      for (let i = 0; i < obstaclesInSegment; i++) {
        let ox, oz;
        let attempts = 0;
        do {
          ox = Math.random() * (maxX - minX) + minX;
          oz = zStart + 10 + Math.random() * (segmentLength - 20);
          attempts++;
        } while (placed.some(p => Math.abs(p.x - ox) < 1.2 && Math.abs(p.z - oz) < 3) && attempts < 10);
        placed.push({x: ox, z: oz});
        const o = new THREE.Mesh(obstacleGeo, obstacleMatBase.clone());
        o.position.set(ox, 0.5, oz);
        group.add(o);
        obstacles.push({ mesh: o, box: new THREE.Box3(), group });
      }

      scene.add(group);
      roadSegments.push(group);
    }

    function ensureSegmentsAround(zCenter) {
      // Create forward segments up to maintainAheadDistance
      let maxZStart = roadSegments.length
        ? Math.max(...roadSegments.map(g => g.userData.zStart))
        : Math.floor((zCenter - 100) / segmentLength) * segmentLength - segmentLength; // seed a little behind
      while (maxZStart + segmentLength < zCenter + maintainAheadDistance) {
        const nextZStart = maxZStart + segmentLength;
        createRoadSegment(nextZStart);
        maxZStart = nextZStart;
      }

      // Ensure there is at least some segments behind
      let minZStart = roadSegments.length
        ? Math.min(...roadSegments.map(g => g.userData.zStart))
        : Math.floor((zCenter - 200) / segmentLength) * segmentLength - segmentLength;
      while (minZStart > zCenter - maintainBehindDistance) {
        const prevZStart = minZStart - segmentLength;
        createRoadSegment(prevZStart);
        minZStart = prevZStart;
      }
    }

    function cullFarSegments(zCenter) {
      for (let i = roadSegments.length - 1; i >= 0; i--) {
        const g = roadSegments[i];
        const zStart = g.userData.zStart;
        const zEnd = zStart + segmentLength;
        if (zEnd < zCenter - maintainBehindDistance - segmentLength) {
          // Remove obstacles tied to this segment
          for (let j = obstacles.length - 1; j >= 0; j--) {
            if (obstacles[j].group === g) {
              scene.remove(obstacles[j].mesh);
              obstacles.splice(j, 1);
            }
          }
          scene.remove(g);
          roadSegments.splice(i, 1);
        }
      }
    }

    

    // Car
    const car = new THREE.Group();
    const carBodyGeo = new THREE.BoxGeometry(1.2, 0.5, 2.5);
    const carBodyMat = new THREE.MeshStandardMaterial({color: "#0341a3", emissive: "#00fff7", emissiveIntensity: 1.5});
    const carBody = new THREE.Mesh(carBodyGeo, carBodyMat);
    carBody.position.y = 0.35;
    car.add(carBody);
    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.4, 16);
    const wheelMat = new THREE.MeshStandardMaterial({color: "#222"});
    for (let x of [-0.5, 0.5]) {
      for (let z of [-0.9, 0.9]) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI/2;
        wheel.position.set(x, 0.15, z);
        car.add(wheel);
      }
    }
    car.position.set(0, 0.25, -50);
    scene.add(car);
    // Seed initial segments around the car
    ensureSegmentsAround(car.position.z);
    initialSegmentIndex = Math.floor((car.position.z) / segmentLength);

    // Car controls
    let speed = 0, maxSpeed = 1.2, acc = 0.03, friction = 0.015, steer = 0;
    let keys = {};
    let score = 0;
    let lastZ = car.position.z;
    let paused = false;
    let gameOver = false;
    let bgm = document.getElementById('bgm');
    let engine = document.getElementById('engine');
    let accel = document.getElementById('accel');
    let playPauseBtn = document.getElementById('playPauseBtn');
    let scoreDisplay = document.getElementById('score');
    let overlay = document.getElementById('gameOverOverlay');
    let finalScoreEl = document.getElementById('finalScore');
    let restartBtn = document.getElementById('restartBtn');
    let enginePlaying = false;
    let accelPlaying = false;
    const carBox = new THREE.Box3();
    
    function playAll() {
      bgm.play();
      bgm.volume = 0.5;
      engine.play();
    }
    function pauseAll() {
      bgm.pause();
      engine.pause();
      accel.pause();
    }
    playPauseBtn.onclick = function() {
      paused = !paused;
      playPauseBtn.textContent = paused ? 'Play' : 'Pause';
      if (paused) pauseAll();
      else if (!gameOver) playAll();
    };
    function endGame() {
      if (gameOver) return;
      gameOver = true;
      paused = true;
      pauseAll();
      finalScoreEl.textContent = Math.floor(score);
      overlay.style.display = 'flex';
      playPauseBtn.disabled = true;
    }
    function resetGame() {
      score = 0;
      scoreDisplay.textContent = 'Score: 0';
      speed = 0;
      steer = 0;
      gameOver = false;
      paused = false;
      playPauseBtn.disabled = false;
      playPauseBtn.textContent = 'Pause';
      car.position.set(0, 0.25, -50);
      lastZ = car.position.z;
      // Clear all segments and obstacles
      for (let i = roadSegments.length - 1; i >= 0; i--) {
        scene.remove(roadSegments[i]);
        roadSegments.splice(i, 1);
      }
      for (let j = obstacles.length - 1; j >= 0; j--) {
        scene.remove(obstacles[j].mesh);
        obstacles.splice(j, 1);
      }
      ensureSegmentsAround(car.position.z);
      initialSegmentIndex = Math.floor((car.position.z) / segmentLength);
      overlay.style.display = 'none';
      playAll();
    }
    restartBtn.onclick = resetGame;
    // Start music on first user interaction (browser policy)
    function startAudioOnce() {
      playAll();
      window.removeEventListener('keydown', startAudioOnce);
      window.removeEventListener('pointerdown', startAudioOnce);
    }
    window.addEventListener('keydown', startAudioOnce);
    window.addEventListener('pointerdown', startAudioOnce);
    document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function animate() {
      if (!paused && !gameOver) {
        // Controls
        if (keys['arrowup'] || keys['w']) {
          speed += acc;
          if (!accelPlaying) {
            accel.currentTime = 0;
            accel.volume = 1;
            accel.play();
            accelPlaying = true;
          }
        } else {
          speed -= friction;
          accel.pause();
          accelPlaying = false;
        }
        if (keys['arrowdown'] || keys['s']) speed -= acc*0.7;
        if (keys['arrowright'] || keys['d']) steer = Math.max(steer - 0.04, -0.04);
        else if (keys['arrowleft'] || keys['a']) steer = Math.min(steer + 0.04, 0.04);
        else steer *= 0.7;
        speed = Math.max(Math.min(speed, maxSpeed), 0);
        car.position.z += speed * 2;
        car.position.x += steer * 2;
        car.position.x = Math.max(Math.min(car.position.x, roadWidth/2-0.7), -roadWidth/2+0.7);
        // Infinite road generation and culling around the car
        ensureSegmentsAround(car.position.z);
        cullFarSegments(car.position.z);
        // Scoring
        score += Math.max(0, car.position.z - lastZ);
        lastZ = car.position.z;
        scoreDisplay.textContent = 'Score: ' + Math.floor(score);
        // Engine sound dynamics
        engine.volume = Math.min(0.8 + speed/2, 1);
        engine.playbackRate = 0.8 + Math.min(speed / maxSpeed, 1) * 0.9;
        // Camera follows car
        camera.position.lerp(new THREE.Vector3(car.position.x, 5, car.position.z - 10), 0.1);
        camera.lookAt(car.position.x, 0.5, car.position.z + 10);
        // Collision detection
        carBox.setFromObject(car);
        for (let i = 0; i < obstacles.length; i++) {
          obstacles[i].box.setFromObject(obstacles[i].mesh);
          if (carBox.intersectsBox(obstacles[i].box)) {
            endGame();
            break;
          }
        }
      }
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
