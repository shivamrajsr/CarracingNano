<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberPunkNano Racing</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0f0c29; }
    /* #info {
      position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace;
      background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; z-index: 1;
    } */
    #gameOverOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-family: monospace;
      z-index: 3;
      text-align: center;
    }
    #gameOverOverlay .panel {
      background: rgba(15,12,41,0.9);
      border: 1px solid #00fff7;
      box-shadow: 0 0 20px #00fff7;
      padding: 20px 28px;
      border-radius: 10px;
    }
    #gameOverOverlay button {
      margin-top: 12px;
      font-size: 1.1em;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: #00fff7;
      color: #222;
      cursor: pointer;
    }
    body {
            background-color: #0d0d0d; /* Very dark background for high contrast */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif; /* A font that fits the neon/tech theme */
            overflow: hidden; /* Prevents scrollbars from appearing */
            color: #fff;
        }

        /* This container holds the text and fixes it to the bottom right */
        .neon-container {
            position: fixed; /* Position relative to the browser window */
            bottom: 10px;    /* 20px from the bottom edge */
            right: 20px;     /* 20px from the right edge */
            text-align: right;
        }
        .neon-container-top {
            position: fixed; /* Position relative to the browser window */
            top: 0px;    /* 20px from the bottom edge */
             /* 20px from the right edge */
            text-align: center;
        }
        .instructions {
          position: fixed;
          bottom: 20px;
          left: 20px;
          text-align: left;
        }
        .neon-text-heading {
            color: #fff; /* The base text color is white */
            font-size: 1.6rem; /* Starting font size */
            /* The text-shadow property is key. We layer multiple shadows to create a soft glow. */
            text-shadow:
                0 0 2px #00bfff,   /* Inner, bright cyan glow */
                0 0 5px #00bfff,  /* Middle cyan glow */
                0 0 10px #00bfff;  /* Outer magenta glow */
            
            /* Apply the flicker animation */
            animation: flicker 2s infinite alternate;
        }
        .texttypethree {
          color: #fff; /* The base text color is white */
          font-size: 0.8rem;

        }
        /* This class creates the neon glow and flicker effect */
        .neon-text {
            color: #fff; /* The base text color is white */
            font-size: 0.5rem; /* Starting font size */
            /* The text-shadow property is key. We layer multiple shadows to create a soft glow. */
            text-shadow:
                0 0 5px #00bfff,   /* Inner, bright cyan glow */
                0 0 10px #00bfff,  /* Middle cyan glow */
                0 0 20px #00bfff;  /* Outer magenta glow */
            
            /* Apply the flicker animation */
            animation: flicker 2s infinite alternate;
        }

        /* Keyframe animation for the flickering effect */
        @keyframes flicker {
            /* These percentages define when the glow is on or off */
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                /* Full glow effect */
                text-shadow:
                    0 0 4px #fff,
                    0 0 11px #00bfff,
                    0 0 19px #00bfff,
                    0 0 40px #ff00ff,
                    0 0 80px #ff00ff,
                    0 0 90px #ff00ff;
            }
            /* At these points in the animation, the glow briefly turns off */
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        
  </style>
</head>
<body>
  <div class="neon-container-top"> <p class="neon-text-heading">CyberPunk Racing</p><span id="score">Score: 0</span></div>
  <div class="instructions"><p class="texttypethree">1. Avoid hitting red blocks<br>2. Difficulty increases with the score</br>Lets see how much you can score!!!</p>Use Arrow Keys or WASD to drive</div>
  <div class="neon-container">
    <p class="neon-text">GenAIGames@SR</p>
</div>
  <button id="playPauseBtn" style="position:absolute;top:10px;right:10px;z-index:2;font-size:1.1em;padding:8px 18px;border-radius:8px;border:none;background:#00fff7;color:#222;cursor:pointer;">Pause</button>
  <div id="gameOverOverlay">
    <div class="panel">
      Game Over<br>
      <div>Final Score: <span id="finalScore">0</span></div>
      <button id="restartBtn">Restart</button>
    </div>
  </div>
  <audio id="bgm" src="audio/racingcarsbgmusic.mp3" loop></audio>
  <audio id="engine" src="" loop></audio>
  <audio id="accel" src="audio/accelarating.mp3"></audio>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog("#0f0c29", 20, 200);
    
    // Camera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, -10);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor("#0f0c29");
    document.body.appendChild(renderer.domElement);

    // Nano-themed lights
    const ambient = new THREE.AmbientLight("#00fff7", 0.3);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight("#00ff99", 0.7);
    dirLight.position.set(10, 20, -10);
    scene.add(dirLight);

    // Infinite Road (segment-based)
    const roadWidth = 10;
    const segmentLength = 400;
    const maintainAheadDistance = 1000;   // how far ahead to keep segments
    const maintainBehindDistance = 400;  // how far behind to keep segments
    const roadGeo = new THREE.BoxGeometry(roadWidth, 0.2, segmentLength);
    const roadMat = new THREE.MeshStandardMaterial({color: "#222", emissive: "#00fff7", emissiveIntensity: 0.1});
    const stripeGeo = new THREE.BoxGeometry(0.5, 0.05, 4);
    const stripeMat = new THREE.MeshStandardMaterial({color: "#00fff7", emissive: "#00fff7", emissiveIntensity: 1});

    const roadSegments = []; // array of THREE.Group with userData.zStart

    // Obstacles (dynamic, tied to segments)
    const obstacles = []; // { mesh, box, group }
    const obstacleGeo = new THREE.BoxGeometry(0.8, 1, 1.6);
    const obstacleMatBase = new THREE.MeshStandardMaterial({
      color: "#ff00ea",
      emissive: "#ff0000",
      emissiveIntensity: 0.6,
      metalness: 0.6,
      roughness: 0.3
    });
    let score = 0;
    function createBuildingMesh(x, z) {
      const height = 4 + Math.random() * 16;
      const geo = new THREE.BoxGeometry(2 + Math.random()*2, height, 2 + Math.random()*2);
      const buildingColors = [
        "#00fff7", "#ff00ea", "#00ff99", "#fffb00", "#00bfff",
        "#ff5733", "#33ff57", "#3357ff", "#ff33a6", "#a633ff",
        "#00ffaa", "#ffaa00", "#ff0066", "#66ff00", "#0066ff"
      ];
      const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: color,
        emissiveIntensity: 0.7 + Math.random()*0.5,
        metalness: 0.8,
        roughness: 0.3
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, height/2, z);
      return mesh;
    }

    let initialSegmentIndex = 0; // set after car spawn/reset

    function createRoadSegment(zStart) {
      const group = new THREE.Group();
      group.userData.zStart = zStart;

      // Road slab
      const road = new THREE.Mesh(roadGeo, roadMat);
      road.position.set(0, -0.1, zStart + segmentLength/2);
      group.add(road);

      // Stripes down the center
      for (let dz = 5; dz < segmentLength; dz += 10) {
        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
        stripe.position.set(0, 0.11, zStart + dz);
        group.add(stripe);
      }

      // Buildings along both sides, sparse
      for (let dz = 0; dz < segmentLength; dz += 20) {
        for (const side of [-1, 1]) {
          if (Math.random() > 0.4) {
            const x = side * (roadWidth/2 + 4 + Math.random()*4);
            const z = zStart + dz + Math.random()*10;
            const b = createBuildingMesh(x, z);
            group.add(b);
          }
        }
      }

      // Obstacles increase with progress: +1 per segment, capped
      const segmentIndex = Math.floor(zStart / segmentLength);
      const progressIndex = Math.max(0, segmentIndex - initialSegmentIndex);
      const maxObstaclesPerSegment = 6;
      const obstaclesInSegment = Math.min( score/800, maxObstaclesPerSegment);
      const minX = -roadWidth/2 + 0.8;
      const maxX = roadWidth/2 - 0.8;
      const placed = [];
      for (let i = 0; i < obstaclesInSegment; i++) {
        let ox, oz;
        let attempts = 0;
        do {
          ox = Math.random() * (maxX - minX) + minX;
          oz = zStart + 10 + Math.random() * (segmentLength - 20);
          attempts++;
        } while (placed.some(p => Math.abs(p.x - ox) < 1.2 && Math.abs(p.z - oz) < 3) && attempts < 10);
        placed.push({x: ox, z: oz});
        const o = new THREE.Mesh(obstacleGeo, obstacleMatBase.clone());
        o.position.set(ox, 0.5, oz);
        group.add(o);
        obstacles.push({ mesh: o, box: new THREE.Box3(), group });
      }

      scene.add(group);
      roadSegments.push(group);
    }

    function ensureSegmentsAround(zCenter) {
      // Create forward segments up to maintainAheadDistance
      let maxZStart = roadSegments.length
        ? Math.max(...roadSegments.map(g => g.userData.zStart))
        : Math.floor((zCenter - 100) / segmentLength) * segmentLength - segmentLength; // seed a little behind
      while (maxZStart + segmentLength < zCenter + maintainAheadDistance) {
        const nextZStart = maxZStart + segmentLength;
        createRoadSegment(nextZStart);
        maxZStart = nextZStart;
      }

      // Ensure there is at least some segments behind
      let minZStart = roadSegments.length
        ? Math.min(...roadSegments.map(g => g.userData.zStart))
        : Math.floor((zCenter - 200) / segmentLength) * segmentLength - segmentLength;
      while (minZStart > zCenter - maintainBehindDistance) {
        const prevZStart = minZStart - segmentLength;
        createRoadSegment(prevZStart);
        minZStart = prevZStart;
      }
    }

    function cullFarSegments(zCenter) {
      for (let i = roadSegments.length - 1; i >= 0; i--) {
        const g = roadSegments[i];
        const zStart = g.userData.zStart;
        const zEnd = zStart + segmentLength;
        if (zEnd < zCenter - maintainBehindDistance - segmentLength) {
          // Remove obstacles tied to this segment
          for (let j = obstacles.length - 1; j >= 0; j--) {
            if (obstacles[j].group === g) {
              scene.remove(obstacles[j].mesh);
              obstacles.splice(j, 1);
            }
          }
          scene.remove(g);
          roadSegments.splice(i, 1);
        }
      }
    }

    

    // Car
    const NANO = {
      cyan: 0x00ffe1,
      magenta: 0xff3ccf,
      lime: 0xb8ff00,
      sky: 0x7fe3ff,
      base: 0xadd8e6 // light blue base for subtle panels
    };

    // Car group
    const car = new THREE.Group();

    // Main body (rounded-ish using merged boxes)
    const bodyBase = new THREE.BoxGeometry(1.6, 1, 3.2);
    bodyBase.translate(0, 0.45, 0);
    const bodyMat = new THREE.MeshStandardMaterial({color: NANO.base, emissive: NANO.cyan, emissiveIntensity: 1.0, metalness:0.6, roughness:0.12});
    const body = new THREE.Mesh(bodyBase, bodyMat);
    car.add(body);

    // Nano accent panels (magenta & lime)
    const accent1 = new THREE.BoxGeometry(1.2, 0.06, 0.7);
    accent1.translate(0, 0.62, -1.6);
    const a1 = new THREE.Mesh(accent1, new THREE.MeshStandardMaterial({color:NANO.magenta, emissive:NANO.magenta, emissiveIntensity:0.9, metalness:0.8, roughness:0.05}));
    car.add(a1);

    const accent2 = accent1.clone();
    // BUG FIX: BufferGeometry doesn't have translateZ; use translate(x,y,z)
    accent2.translate(0, 0, -0.8);
    const a2 = new THREE.Mesh(accent2, new THREE.MeshStandardMaterial({color:NANO.lime, emissive:NANO.lime, emissiveIntensity:0.75, metalness:0.7, roughness:0.06}));
    car.add(a2);

    // Cockpit (glass)
    const cockpitGeo = new THREE.BoxGeometry(1, 0.5, 1)
    cockpitGeo.translate(0, 0.85, 0);
    const cockpitMat = new THREE.MeshPhysicalMaterial({color:0x071022, transmission:0.7, transparent:true, opacity:0.85, metalness:0.1, roughness:0.02, ior:1.2});
    const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
    car.add(cockpit);


    // Wheels (stylized rings)
    function makeWheel(x,z){
      const rim = new THREE.CylinderGeometry(0.36,0.36,0.28,24);
      rim.rotateZ(Math.PI/2);
      rim.translate(x,0.1,z);
      const rimMat = new THREE.MeshStandardMaterial({color:0x05050a, metalness:0.95, roughness:0.25});
      const rimMesh = new THREE.Mesh(rim, rimMat);

      const ring = new THREE.Mesh(new THREE.RingGeometry(0.22, 0.28, 32), new THREE.MeshBasicMaterial({color:NANO.cyan, side:THREE.DoubleSide}));
      ring.rotation.y = Math.PI/2; ring.position.set(x,0.12,z); ring.userData.isNeon = true;

      const g = new THREE.Group(); g.add(rimMesh); g.add(ring);
      return g;
    }
    car.add(makeWheel(0.90, -0.8)); car.add(makeWheel(-0.90, -0.8)); car.add(makeWheel(0.90, 0.8)); car.add(makeWheel(-0.90, 0.8));

    car.scale.set(0.95,0.95,0.95);
    car.position.y = 0;
    scene.add(car);
  
    ensureSegmentsAround(car.position.z);
    initialSegmentIndex = Math.floor((car.position.z) / segmentLength);

    // Car controls
    let speed = 0, maxSpeed = 1.4, acc = 0.04, friction = 0.016, steer = 0;
    let keys = {};
    // let score = 0;
    let lastZ = car.position.z;
    let paused = false;
    let gameOver = false;
    let bgm = document.getElementById('bgm');
    let engine = document.getElementById('engine');
    let accel = document.getElementById('accel');
    let playPauseBtn = document.getElementById('playPauseBtn');
    let scoreDisplay = document.getElementById('score');
    let overlay = document.getElementById('gameOverOverlay');
    let finalScoreEl = document.getElementById('finalScore');
    let restartBtn = document.getElementById('restartBtn');
    let enginePlaying = false;
    let accelPlaying = false;
    const carBox = new THREE.Box3();
    
    function playAll() {
      bgm.play();
      bgm.volume = 0.4;
      engine.play();
    }
    function pauseAll() {
      bgm.pause();
      engine.pause();
      accel.pause();
    }
    playPauseBtn.onclick = function() {
      paused = !paused;
      playPauseBtn.textContent = paused ? 'Play' : 'Pause';
      if (paused) pauseAll();
      else if (!gameOver) playAll();
    };
    function endGame() {
      if (gameOver) return;
      gameOver = true;
      paused = true;
      pauseAll();
      finalScoreEl.textContent = Math.floor(score);
      overlay.style.display = 'flex';
      playPauseBtn.disabled = true;
    }
    function resetGame() {
      score = 0;
      scoreDisplay.textContent = 'Score: 0';
      speed = 0;
      steer = 0;
      gameOver = false;
      paused = false;
      playPauseBtn.disabled = false;
      playPauseBtn.textContent = 'Pause';
      car.position.set(0, 0.25, -50);
      lastZ = car.position.z;
      // Clear all segments and obstacles
      for (let i = roadSegments.length - 1; i >= 0; i--) {
        scene.remove(roadSegments[i]);
        roadSegments.splice(i, 1);
      }
      for (let j = obstacles.length - 1; j >= 0; j--) {
        scene.remove(obstacles[j].mesh);
        obstacles.splice(j, 1);
      }
      ensureSegmentsAround(car.position.z);
      initialSegmentIndex = Math.floor((car.position.z) / segmentLength);
      overlay.style.display = 'none';
      playAll();
    }
    restartBtn.onclick = resetGame;
    // Start music on first user interaction (browser policy)
    function startAudioOnce() {
      playAll();
      window.removeEventListener('keydown', startAudioOnce);
      window.removeEventListener('pointerdown', startAudioOnce);
    }
    window.addEventListener('keydown', startAudioOnce);
    window.addEventListener('pointerdown', startAudioOnce);
    document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function animate() {
      if (!paused && !gameOver) {
        // Controls
        if (keys['arrowup'] || keys['w']) {
          speed += acc;
          if (!accelPlaying) {
            accel.currentTime = 0;
            accel.volume = 1;
            accel.play();
            accelPlaying = true;
          }
        } else {
          speed -= friction;
          accel.pause();
          accelPlaying = false;
        }
        if (keys['arrowdown'] || keys['s']) speed -= acc*0.7;
        if (keys['arrowright'] || keys['d']) steer = Math.max(steer - 0.04, -0.04);
        else if (keys['arrowleft'] || keys['a']) steer = Math.min(steer + 0.04, 0.04);
        else steer *= 0.7;
        speed = Math.max(Math.min(speed, maxSpeed), 0);
        car.position.z += speed * 2;
        car.position.x += steer * 2;
        car.position.x = Math.max(Math.min(car.position.x, roadWidth/2-0.7), -roadWidth/2+0.7);
        // Infinite road generation and culling around the car
        ensureSegmentsAround(car.position.z);
        cullFarSegments(car.position.z);
        // Scoring
        score += Math.max(0, car.position.z - lastZ);
        lastZ = car.position.z;
        scoreDisplay.textContent = 'Score: ' + Math.floor(score);
        // Engine sound dynamics
        engine.volume = Math.min(0.8 + speed/2, 1);
        engine.playbackRate = 0.8 + Math.min(speed / maxSpeed, 1) * 0.9;
        // Camera follows car
        camera.position.lerp(new THREE.Vector3(car.position.x, 5, car.position.z - 10), 0.1);
        camera.lookAt(car.position.x, 0.5, car.position.z + 10);
        // Collision detection
        carBox.setFromObject(car);
        for (let i = 0; i < obstacles.length; i++) {
          obstacles[i].box.setFromObject(obstacles[i].mesh);
          if (carBox.intersectsBox(obstacles[i].box)) {
            endGame();
            break;
          }
        }
      }
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
